name: CI

on:
  pull_request:
  push:
    branches: [main]

# Read-only: this workflow never needs to write to the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Regenerate external-tools catalog
        run: npm run gen:tools

      - name: Check generated catalog is in sync
        run: |
          if ! git diff --exit-code -- lib/data/external-tools.generated.ts; then
            echo "::error::lib/data/external-tools.generated.ts is out of date. Run 'npm run gen:tools' and commit the result."
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- run
